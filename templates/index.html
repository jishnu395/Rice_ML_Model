<!DOCTYPE html>
<html>

<head>

    <title>Rice Classification</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Rice Grain Classifier</h1>

<form action="/predict" method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<h2>Prediction :</h2>

<h1 class="result">{{ prediction }}</h1>

<img src="{{ image_path }}" width="350">

{% endif %}

</div>

</body>
</html>
